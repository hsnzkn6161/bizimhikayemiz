<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hasan ❤️ Merve</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;

background:linear-gradient(180deg,#fffdf8,#fff7f9);

}

.card{

width:90%;
max-width:420px;

background:rgba(255,255,255,.7);

backdrop-filter:blur(15px);

border-radius:25px;

padding:40px;

box-shadow:0 15px 40px rgba(0,0,0,.12);

text-align:center;

}

h1{

font-size:34px;

color:#d6336c;

margin-bottom:15px;

}

.subtitle{

font-size:18px;

color:#777;

margin-bottom:30px;

}

#counter{

font-size:34px;

font-weight:bold;

line-height:1.6;

color:#333;

margin-bottom:25px;

}

.message{

font-size:18px;

color:#666;

}

.flower{

position:fixed;

font-size:24px;

animation:fall linear infinite;

opacity:.8;

}

@keyframes fall{

0%{

transform:translateY(-100px) rotate(0deg);

}

100%{

transform:translateY(110vh) rotate(360deg);

}

}

</style>

</head>

<body>

<div class="card">

<h1>🌼 Hasan ❤️ Merve 🌼</h1>

<div class="subtitle">

15 Haziran 2022'den beri...

</div>

<div id="counter"></div>

<div class="message">

İyi ki hayatımdasın ❤️

<br><br>

Her geçen saniye seni daha çok seviyorum.

</div>

</div>

<script>

const startDate=new Date("2022-06-15T00:00:00");

function updateCounter(){

const now=new Date();

let diff=now-startDate;

let totalSeconds=Math.floor(diff/1000);

const days=Math.floor(totalSeconds/86400);

totalSeconds%=86400;

const hours=Math.floor(totalSeconds/3600);

totalSeconds%=3600;

const minutes=Math.floor(totalSeconds/60);

const seconds=totalSeconds%60;

document.getElementById("counter").innerHTML=

`${days} Gün<br>

${hours} Saat<br>

${minutes} Dakika<br>

${seconds} Saniye`;

}

setInterval(updateCounter,1000);

updateCounter();

for(let i=0;i<25;i++){

const flower=document.createElement("div");

flower.className="flower";

flower.innerHTML="🌼";

flower.style.left=Math.random()*100+"vw";

flower.style.animationDuration=(8+Math.random()*10)+"s";

flower.style.fontSize=(18+Math.random()*22)+"px";

flower.style.animationDelay=Math.random()*10+"s";

document.body.appendChild(flower);

}

</script>

</body>

</html>
